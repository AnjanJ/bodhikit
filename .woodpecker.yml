# Mirror to GitHub on every push to Codeberg
# Requires GITHUB_MIRROR_TOKEN secret in Codeberg repo settings
# (GitHub PAT with repo scope)
when:
  event: push

steps:
  mirror:
    image: alpine/git
    secrets: [github_mirror_token]
    commands:
      - git remote add github https://${GITHUB_MIRROR_TOKEN}@github.com/AnjanJ/bodhikit.git || true
      - git push github --mirror --force
